# GitHub Actions para validación de Docker

name: Docker Build Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: billete-seguro-bcb:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        # Iniciar contenedor
        docker run -d --name test-container -p 3000:3000 billete-seguro-bcb:test
        
        # Esperar que inicie
        sleep 30
        
        # Health check
        curl -f http://localhost:3000 || exit 1
        
        # Verificar logs
        docker logs test-container
        
        # Limpiar
        docker stop test-container
        docker rm test-container
        
    - name: Image size check
      run: |
        size=$(docker images billete-seguro-bcb:test --format "{{.Size}}")
        echo "Image size: $size"
        
  # Opcional: Escaneo de seguridad
  security-scan:
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build image for scanning
      run: docker build -t billete-seguro-bcb:scan .
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'billete-seguro-bcb:scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
