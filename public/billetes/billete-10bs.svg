<svg width="800" height="533" viewBox="0 0 800 533" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    <pattern id="watermark" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <text x="50" y="100" font-family="Arial" font-size="60" fill="#ef4444" opacity="0.1" transform="rotate(-45 100 100)">BCB</text>
    </pattern>
  </defs>
  
  <!-- Bill background -->
  <rect width="800" height="533" fill="url(#redGradient)"/>
  <rect width="800" height="533" fill="url(#watermark)"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="780" height="513" fill="none" stroke="#dc2626" stroke-width="4" rx="15"/>
  
  <!-- Serial number box (top right) -->
  <rect x="600" y="30" width="180" height="60" fill="#ffffff" stroke="#dc2626" stroke-width="3" rx="5"/>
  <text x="690" y="55" font-family="Courier New, monospace" font-size="24" font-weight="bold" fill="#991b1b" text-anchor="middle">000000000 B</text>
  <text x="690" y="75" font-family="Arial" font-size="12" fill="#7f1d1d" text-anchor="middle">SERIE B</text>
  
  <!-- Highlight arrow -->
  <path d="M 550 60 L 590 60" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowred)"/>
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
  </defs>
  
  <!-- BCB Logo placeholder -->
  <circle cx="150" cy="250" r="80" fill="#ffffff" opacity="0.8"/>
  <text x="150" y="260" font-family="Arial" font-size="48" font-weight="bold" fill="#dc2626" text-anchor="middle">10</text>
  <text x="150" y="285" font-family="Arial" font-size="16" fill="#991b1b" text-anchor="middle">BOLIVIANOS</text>
  
  <!-- Decorative elements -->
  <text x="400" y="300" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.5">BANCO CENTRAL DE BOLIVIA</text>
  
  <!-- Bottom text -->
  <rect x="200" y="460" width="400" height="40" fill="#ffffff" opacity="0.7" rx="5"/>
  <text x="400" y="485" font-family="Arial" font-size="14" fill="#7f1d1d" text-anchor="middle" font-weight="bold">DIEZ BOLIVIANOS</text>
  
  <!-- Watermark text -->
  <text x="400" y="150" font-family="Arial" font-size="80" font-weight="bold" fill="#dc2626" text-anchor="middle" opacity="0.15">Bs 10</text>
  
  <!-- Note -->
  <text x="400" y="520" font-family="Arial" font-size="11" fill="#991b1b" text-anchor="middle" font-style="italic">Este es un placeholder - Reemplazar con imagen real del billete</text>
</svg>
