version: '3.8'

services:
  billete-seguro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billete-seguro-bcb
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "org.opencontainers.image.title=BilleteSeguroBCB"
      - "org.opencontainers.image.description=Validador de Billetes BCB"
      - "org.opencontainers.image.version=1.0.0"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
